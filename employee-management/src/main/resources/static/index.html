<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Employee Management System</h1>
            <p>Manage Employee Records</p>
        </header>

        <!-- Add/Edit Employee Form -->
        <section class="form-section">
            <h2 id="formTitle">Add New Employee</h2>
            <form id="employeeForm">
                <div class="form-group">
                    <label for="employeeId">Employee ID (Auto):</label>
                    <input type="text" id="employeeId" readonly>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name *:</label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name *:</label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="age">Age *:</label>
                        <input type="number" id="age" name="age" min="18" max="70" required>
                    </div>
                    <div class="form-group">
                        <label for="panCardNumber">PAN Card Number *:</label>
                        <input type="text" id="panCardNumber" name="panCardNumber" placeholder="e.g., AAAAA0000A" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="department">Department *:</label>
                        <select id="department" name="department" required>
                            <option value="">Select Department</option>
                            <option value="IT">IT</option>
                            <option value="HR">HR</option>
                            <option value="Finance">Finance</option>
                            <option value="Operations">Operations</option>
                            <option value="Sales">Sales</option>
                            <option value="Marketing">Marketing</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="salary">Salary *:</label>
                        <input type="number" id="salary" name="salary" min="0" step="0.01" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" id="submitBtn" class="btn btn-primary">Add Employee</button>
                    <button type="reset" id="resetBtn" class="btn btn-secondary">Clear Form</button>
                    <button type="button" id="cancelBtn" class="btn btn-secondary" style="display:none;">Cancel Edit</button>
                </div>
            </form>
        </section>

        <!-- Employee Table -->
        <section class="table-section">
            <h2>Employee List</h2>
            <div class="table-controls">
                <input type="text" id="searchBox" placeholder="Search by name or ID..." class="search-box">
            </div>
            <div class="table-responsive">
                <table id="employeeTable">
                    <thead>
                        <tr>
                            <th>Employee ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Age</th>
                            <th>PAN Card</th>
                            <th>Department</th>
                            <th>Salary</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="employeeTableBody">
                        <!-- Populated by JavaScript -->
                    </tbody>
                </table>
            </div>
            <div id="noDataMessage" class="no-data">No employees found. Add one to get started!</div>
        </section>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="spinner" style="display:none;">
        <div class="spinner-border"></div>
        <p>Loading...</p>
    </div>

    <!-- Modal for confirmations -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h3>Confirm Delete</h3>
            <p id="confirmMessage"></p>
            <div class="modal-actions">
                <button id="confirmBtn" class="btn btn-danger">Delete</button>
                <button id="cancelConfirmBtn" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Success/Error Messages -->
    <div id="messageBox" class="message-box"></div>

    <script src="/script.js"></script>
</body>
</html>
